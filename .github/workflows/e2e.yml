# ─── VCTRL Playwright E2E ─────────────────────────────────────────────────────
# Runs on every push and pull request across all branches.
# Snapshot diffs, videos, and the HTML report are uploaded as artifacts
# (retained for 30 days) so failures are always reviewable.
#
# Required repository secrets (Settings → Secrets → Actions):
#   NEXT_PUBLIC_SUPABASE_URL       – Supabase project URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY  – Supabase anon key
#   SUPABASE_SERVICE_ROLE_KEY      – service-role key (used by server actions)

name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  e2e:
    name: Playwright E2E
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      # Run tests against `next start` (production build) for CI stability.
      # We temporarily override the webServer command via an env var read in
      # playwright.config.ts (see note below), then fall back to the default.
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          # Tell the Playwright config to use `next start` instead of `next dev`
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start

      # Upload artifacts on both pass and failure so diffs are always accessible
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.ref_name }}-${{ github.sha }}
          # Expire after 30 days
          retention-days: 30
          path: |
            tests/snapshots/
            tests/results/
            tests/report/
          if-no-files-found: warn
